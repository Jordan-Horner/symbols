version: 2

project_name: syms

before:
  hooks:
    - go mod tidy

builds:
  - binary: syms
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

brews:
  - repository:
      owner: Jordan-Horner
      name: homebrew-tap
    homepage: "https://github.com/Jordan-Horner/symbols"
    description: "Fast polyglot source code intelligence CLI"
    license: "MIT"
    install: |
      bin.install "syms"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
