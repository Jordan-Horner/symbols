name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check release metadata
        run: python3 scripts/check_release_metadata.py

      - name: Run tests
        run: go test -race -count=1 -timeout 60s ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-linux:
    needs: release-darwin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check release metadata
        run: python3 scripts/check_release_metadata.py

      - name: Run tests
        run: go test -race -count=1 -timeout 60s ./...

      - name: Build linux amd64
        run: CGO_ENABLED=1 go build -o syms .

      - name: Package linux amd64
        run: tar czf syms_linux_amd64.tar.gz syms

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" syms_linux_amd64.tar.gz --clobber
