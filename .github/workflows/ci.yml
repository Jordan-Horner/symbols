name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o syms .

      - name: Check release metadata
        run: python3 scripts/check_release_metadata.py

      - name: Test
        run: go test -race -count=1 -timeout 60s ./...

      - name: Vet
        run: go vet ./...
